<el-tabs v-model="RightactiveName" v-if="!DataLoading" style="width: 100%;" @tab-click="handleClick">
    <el-tab-pane :label="{lang setting_basic}" name="tool">
        <el-scrollbar>
            <el-form 
                :model="RightformBasic" 
                label-position="top" 
                label-suffix=":"
                style="width: 100%;">
				<el-form-item :label="{lang page_title}">
					<el-input v-model="RightformBasic.pname"></el-input>
				</el-form-item>
				<el-form-item :label="{lang page_description}">
					<el-input v-model="RightformBasic.pdesc"></el-input>
				</el-form-item>
				<el-form-item :label="{lang link}">
					<div style="display: flex;width: 100%;">
						<el-input v-model="RightformBasic.address" style="flex: 1;"></el-input>
						<!-- <el-button style="margin-left: 6px;" icon="CopyDocument"></el-button> -->
					</div>
				</el-form-item>
				<el-form-item :label="{lang view_permission}">
					<orguser-select 
						defaulttype="view" 
						@change="SettingUserChange" 
						:defaultheckeds="SettingFormvisit.checked" 
						:defaultexpanded="SettingFormvisit.expanded" 
						:defaultdata="SettingFormvisit.data"></orguser-select>
				</el-form-item>
				<el-form-item :label="{lang download_permission}">
					<orguser-select 
						defaulttype="down" 
						@change="SettingUserChange" 
						:defaultheckeds="SettingFormdown.checked" 
						:defaultexpanded="SettingFormdown.expanded" 
						:defaultdata="SettingFormdown.data"></orguser-select>
				</el-form-item>
				<el-form-item :label="{lang share_permission}">
					<orguser-select 
						defaulttype="share" 
						@change="SettingUserChange" 
						:defaultheckeds="SettingFormshare.checked" 
						:defaultexpanded="SettingFormshare.expanded" 
						:defaultdata="SettingFormshare.data"></orguser-select>
				</el-form-item>
				<el-form-item :label="{lang collection}">
					<el-select
						v-model="RightformBasic.collection"
						multiple
						style="width: 100%">
						<el-option
							v-for="item in RightformBasic.options"
							:key="item.value"
							:label="item.label"
							:value="item.value"
						></el-option>
					</el-select>
				</el-form-item>
			</el-form>
        </el-scrollbar>
    </el-tab-pane>
    <el-tab-pane :label="{lang setting_preference}" name="like">
        <el-form 
            class="like-form"
            :model="RightformLick" 
            label-position="top" 
            label-suffix=":"
            style="width: 100%;">
            <el-form-item :label="{lang logo_setting}">
				<el-upload
					class="avatar-uploader"
					action="{MOD_URL}&op=admin&operation=uploadimg"
					accept="image/png, image/jpeg,image/jpg, image/webp,image/gif,image/svg"
					:show-file-list="false"
					name="files"
					:on-success="handleUploadLogoSuccess">
					<template v-if="parseFloat(RightformLick._file_logo.aid)">
						<img :src="RightformLick._file_logo.src" class="avatar" />
						<el-icon class="close-img" @click.stop="handleCloseImg('logo')"><Close-Bold /></el-icon>
					</template>
					<template v-else>
						<el-icon class="avatar-uploader-icon"><Plus /></el-icon>
					</template>
				</el-upload>
            </el-form-item>
            <el-form-item :label="{lang carousel_setting}">
                    <el-space
                        wrap
                        direction="horizontal"
                        class="carousel-wrap">
                        <div class="singe" v-for="(item,index) in RightformLick._file_carousel">
                            <el-image style="width: 100%; height: 100%;" :src="item.src" fit="cover"></el-image>
                            <el-icon class="del" @click="deleteImg(index)"><Circle-Close-Filled /></el-icon>
                        </div>
                        <div class="add">
                            <el-upload
                                action="{MOD_URL}&op=admin&operation=upload"
                                accept="image/png, image/jpeg,image/jpg, image/webp,image/gif,image/svg,video/mp4"
                                multiple
                                :show-file-list="false"
                                name="files"
								:before-upload="handleUploadChange"
                                :on-success="handleUploadSuccess">
                                <el-icon><Plus /></el-icon>
                            </el-upload>
                            
                        </div>
                    </el-space>
                <el-text tag="p" type="info" size="small" truncated>{lang carousel_size_tip}</el-text>
            </el-form-item>
            <el-form-item :label="{lang title_tagline}">
                <el-input v-model="RightformLick.title"></el-input>
            </el-form-item>
            <el-form-item :label="{lang search_function}">
                <el-switch 
                    v-model="RightformLick.search" 
                    :active-text="{lang open}" 
                    :inactive-text="{lang close}"
                    :active-value="1"
                    :inactive-value="0"></el-switch>
            </el-form-item>
            <el-form-item :label="{lang image_search}" v-if="RightformLick.search">
                <el-switch 
                    v-model="RightformLick.picture"
                    :active-text="{lang open}" 
                    :inactive-text="{lang close}"
                    :active-value="1"
                    :inactive-value="0"></el-switch>
            </el-form-item>
        </el-form>
    </el-tab-pane>
</el-tabs>
<script type="text/javascript">
	var RightMixin = {
		data(){
			return {
				RightactiveName:'tool',
                RightformBasic:{
                    pname:'',
                    pdesc:'',
                    address:'',
					collection:[],
					options: []
                },
                RightformLick:{
                    _file_logo:{
						aid:0,
						src:''
					},
                    title:'',
                    search:1,
                    picture:1,
                    _file_carousel:[],
                },
                SettingFormvisit:{
					groups:[],
					uids:[],
					data:[],
					checked:[],
					expanded:[],
					status:0
				},
                SettingFormdown:{
					groups:[],
					uids:[],
					data:[],
					checked:[],
					expanded:[],
					status:0
				},
                SettingFormshare:{
					groups:[],
					uids:[],
					data:[],
					checked:[],
					expanded:[],
					status:0
				},
				uploadUrl:[],
			}
		},
        created() {

        },
		methods:{
			handleCloseImg(type){
				this.RightformLick._file_logo = {src:'',aid:0};
			},
			handleUploadChange(rawFile){
				this.uploadUrl.push(URL.createObjectURL(rawFile));
				return true
			},
			handleUploadSuccess(data){
                let self = this;
                if(data.files && data.files.length){
                    let index = this.RightformLick._file_carousel.find(item => parseInt(item.aid) == parseInt(data.files[0].data.aid));
                    if(index > -1){
                        self.$message.error('{lang duplicate_file}')
                        return false;
                    }
                    this.RightformLick._file_carousel.push({
                        src:this.uploadUrl[0],
                        aid:data.files[0].data.aid,
                    });
					this.uploadUrl.splice(0,1)
                }
            },
            handleUploadLogoSuccess(data){
				// RightformLick._file_logo
                let self = this;
                if(data.files && data.files.length){
					this.RightformLick._file_logo.src = data.files[0].data.img;
					this.RightformLick._file_logo.aid = data.files[0].data.aid;
                }
            },
			deleteImg(index){
				this.RightformLick._file_carousel.splice(index,1)
			},
            async addPosition(type){
                let self = this;
                let visit = {};
				let share = {};
				let download = {};
                if(parseFloat(self.SettingFormvisit.status)){
					visit = 0;
				}else if(self.SettingFormvisit.groups && self.SettingFormvisit.groups.length && self.SettingFormvisit.groups.indexOf('unlimit')>-1){
					visit = 1;
				}else{
					if(self.SettingFormvisit.groups && self.SettingFormvisit.groups.length){
						visit['groups'] = self.SettingFormvisit.groups;
					}
					if(self.SettingFormvisit.uids && self.SettingFormvisit.uids.length){
						visit['uids'] = self.SettingFormvisit.uids;
					}
				}
                if(parseFloat(self.SettingFormshare.status)){
					share = 0;
				}else if(self.SettingFormshare.groups && self.SettingFormshare.groups.length && self.SettingFormshare.groups.indexOf('unlimit')>-1){
					share = 1;
				}else{
					if(self.SettingFormshare.groups && self.SettingFormshare.groups.length){
						share['groups'] = self.SettingFormshare.groups;
					}
					if(self.SettingFormshare.uids && self.SettingFormshare.uids.length){
						share['uids'] = self.SettingFormshare.uids;
					}
				}
			
				if(parseFloat(self.SettingFormdown.status)){
					download = 0;
				}else if(self.SettingFormdown.groups && self.SettingFormdown.groups.length && self.SettingFormdown.groups.indexOf('unlimit')>-1){
					download = 1;
				}else{
					if(self.SettingFormdown.groups && self.SettingFormdown.groups.length){
						download['groups'] = self.SettingFormdown.groups;
					}
					if(self.SettingFormdown.uids && self.SettingFormdown.uids.length){
						download['uids'] = self.SettingFormdown.uids;
					}
				}
				let aids = [];
				for(var i in self.RightformLick._file_carousel){
					aids.push(self.RightformLick._file_carousel[i].aid);
				}
				let filter = JSON.parse(JSON.stringify(this.RightformLick));
				if(parseFloat(filter._file_logo.aid)){
					filter['_file_logo'] = [filter._file_logo.aid];
				}
				filter['_file_carousel'] = aids;
                let param = {
					formhash:'{FORMHASH}',
					submit:true,
                    id:$id,
					ptype:'{$data['ptype']}',
					pval:'{$data['pval']}',
                    pname:this.RightformBasic.pname,
                    pdesc:this.RightformBasic.pdesc,
                    address:this.RightformBasic.address,
					rpids:this.RightformBasic.collection,
                    view:visit,
                    download:download,
                    share:share,
                    pageset:filter,
                };
				if(type!=='save'){
					param['pstatus'] = 1;
				}
				this.IsIframe = false;
				let {data: res} = await axios.post('{MOD_URL}&op=admin&operation=basic',param);
				this.IsIframe = true;
            },
            SettingUserChange(data,type){
				var str = {
					groups:[],
					uids:[],
					data:[],
					checked:[],
					expanded:[],
					status:0
				}
				if(data && data.length){
					for(var i in data){
						var item = data[i];
						if(item.type == 'unlimit'){
							str.groups.push('unlimit');
							break;
						}
						if(item.type == 'user'){
							str.uids.push(item.id);
						}else{
							str.groups.push(item.id);
						}
						str.data.push(item);
					}
				}else{
					str.status = 1;
				}
                if(type == 'view'){
                    this.SettingFormvisit = str;
                }else if(type == 'down'){
                    this.SettingFormdown = str;
                }else if(type == 'share'){
                    this.SettingFormshare = str;
                }
			},
		}
	};
</script>
