<el-tabs v-model="RightactiveName" v-if="!DataLoading" style="width: 100%;" class="demo-tabs" @tab-click="handleClick">
    <el-tab-pane label="{lang setting_basic}" name="tool">
        <el-scrollbar>
            <el-form 
                :model="RightformBasic" 
                label-position="top" 
                label-suffix=":"
                style="width: 100%;">
                <el-form-item label="{lang page_title}">
                    <el-input v-model="RightformBasic.pname"></el-input>
                </el-form-item>
                <el-form-item label="{lang pagelogo}">
                    <el-upload
                            class="avatar-uploader"
                            action="{MOD_URL}&op=admin&operation=uploadimg"
                            :show-file-list="false"
                            name="files"
                            accept="image/*"
                            :on-success="handleUploaLogodSuccess">
                        <template v-if="RightformBasic.pageset._file_logo.src">
                            <img :src="RightformBasic.pageset._file_logo.src" class="avatar" />
                            <el-icon class="close-img" @click.stop="handleCloseImg('logo')"><Close-Bold /></el-icon>
                        </template>
                        <template v-else>
                            <el-icon class="avatar-uploader-icon"><Plus /></el-icon>
                        </template>
                    </el-upload>
                </el-form-item>
                <el-form-item label="{lang cover}">
                    <el-upload
                            class="avatar-uploader cover"
                            action="{MOD_URL}&op=admin&operation=uploadimg"
                            :show-file-list="false"
                            name="files"
                            accept="image/*"
                            :on-success="handleCoverUploaLogodSuccess">
                        <template v-if="RightformBasic.pageset._file_cover.src">
                            <img :src="RightformBasic.pageset._file_cover.src" class="avatar" />
                            <el-icon class="close-img" @click.stop="handleCloseImg('cover')"><Close-Bold /></el-icon>
                        </template>
                        <template v-else>
                            <el-icon class="avatar-uploader-icon"><Plus /></el-icon>
                        </template>
                    </el-upload>
                </el-form-item>
                <el-form-item label="{lang collect}">
                    <el-select
                            v-model="RightformBasic.collection"
                            multiple
                            style="width: 100%">
                        <el-option
                                v-for="item in RightformBasic.options"
                                :key="item.value"
                                :label="item.label"
                                :value="item.value"
                        ></el-option>
                    </el-select>
                </el-form-item>
                <el-form-item label="{lang metadescription}">
                    <el-input v-model="RightformBasic.metadescription"  :autosize="{ minRows: 2, maxRows: 4 }"  type="textarea"></el-input>
                </el-form-item>
                <el-form-item label="{lang metakeywords}">
                    <el-input v-model="RightformBasic.metakeywords" :autosize="{ minRows: 2, maxRows: 4 }"  type="textarea"></el-input>
                </el-form-item>
                <el-form-item label="{lang link}">
                    <div style="display: flex;width: 100%;">
                        <el-input v-model="RightformBasic.address" style="flex: 1;"></el-input>
                        <!-- <el-button style="margin-left: 6px;" icon="CopyDocument"></el-button> -->
                    </div>
                </el-form-item>
                <el-form-item label="{lang view_permission}">
                    <orguser-select 
                        defaulttype="view" 
                        @change="SettingUserChange" 
                        :defaultheckeds="SettingFormvisit.checked" 
                        :defaultexpanded="SettingFormvisit.expanded" 
                        :defaultdata="SettingFormvisit.data"></orguser-select>
                </el-form-item>
                <el-form-item label="{lang download_permission}">
                    <orguser-select 
                        defaulttype="down" 
                        @change="SettingUserChange" 
                        :defaultheckeds="SettingFormdown.checked" 
                        :defaultexpanded="SettingFormdown.expanded" 
                        :defaultdata="SettingFormdown.data"></orguser-select>
                </el-form-item>
                <el-form-item label="{lang share_permission}">
                    <orguser-select 
                        defaulttype="share" 
                        @change="SettingUserChange" 
                        :defaultheckeds="SettingFormshare.checked" 
                        :defaultexpanded="SettingFormshare.expanded" 
                        :defaultdata="SettingFormshare.data"></orguser-select>
                </el-form-item>
				<el-form-item label="{lang collection}">
					<el-select
						v-model="RightformBasic.collection"
						multiple
						style="width: 100%">
						<el-option
							v-for="item in RightformBasic.options"
							:key="item.value"
							label="item.label"
							:value="item.value"
						></el-option>
					</el-select>
				</el-form-item>
                <el-form-item label="{lang top_navigation}" >
                    <el-radio-group v-model="RightformBasic.pageset.topNavigation" style="width: 100%;">
                        <el-radio border style="margin-bottom: 6px;width: 40%;" :label="1">{lang enable}</el-radio>
                        <el-radio border style="margin-bottom: 6px;width: 40%;" :label="0">{lang close}</el-radio>
                    </el-radio-group>
                </el-form-item>
                <el-form-item label="{lang page_footer}">
                    <el-radio-group v-model="RightformBasic.pageset.bottomEnable" style="width: 100%;">
                        <el-radio border style="margin-bottom: 6px;width: 40%;" :label="1">{lang enable}</el-radio>
                        <el-radio border style="margin-bottom: 6px;width: 40%;" :label="0">{lang close}</el-radio>
                    </el-radio-group>
                </el-form-item>

                <el-form-item label="{lang bottom_navigation}" v-if="RightformBasic.pageset.bottomEnable">
                    <el-radio-group v-model="RightformBasic.pageset.bottomNavigation" style="width: 100%;">
                        <el-radio border style="margin-bottom: 6px;width: 40%;" :label="1">{lang enable}</el-radio>
                        <el-radio border style="margin-bottom: 6px;width: 40%;" :label="0">{lang close}</el-radio>
                    </el-radio-group>
                </el-form-item>
                <el-form-item label="{lang footer_info}" v-if="RightformBasic.pageset.bottomEnable">
                    <el-input
                            v-model="RightformBasic.pageset._textarea_bottomtitle"
                            :autosize="{ minRows: 2, maxRows: 4 }"
                            type="textarea"></el-input>
                </el-form-item>
                <el-form-item label="{lang icp_filing}" v-if="RightformBasic.pageset.bottomEnable">
                    <el-input v-model="RightformBasic.pageset.beian"></el-input>
                </el-form-item>
                <el-form-item label="{lang public_security_filing}" v-if="RightformBasic.pageset.bottomEnable">
                    <el-input v-model="RightformBasic.pageset.beianmps"></el-input>
                </el-form-item>
            </el-form>
        </el-scrollbar>
    </el-tab-pane>
</el-tabs>
<script type="text/javascript">
	var RightMixin = {
		data(){
			return {
				RightactiveName:'tool',
                RightformBasic:{
                    pname:'',
                    metakeywords:'',
                    metadescription:'',
                    address:'',
					collection:[],
					options: [],
                    pageset:{
                        _file_logo:{src:'',aid:0},
                        _file_cover:{src:'',aid:0},
                        bottomEnable:0,
                        bottomNavigation:0,
                        topNavigation:0,
                        _textarea_bottomtitle:'',
                        beian:'',
                        beianmps:'',
                    },
                },
                SettingFormvisit:{
					groups:[],
					uids:[],
					data:[],
					checked:[],
					expanded:[],
					status:0
				},
                SettingFormdown:{
					groups:[],
					uids:[],
					data:[],
					checked:[],
					expanded:[],
					status:0
				},
                SettingFormshare:{
					groups:[],
					uids:[],
					data:[],
					checked:[],
					expanded:[],
					status:0
				},
			}
		},
		methods:{
            handleCloseImg(type){
                if(type == 'logo'){
                    this.RightformBasic.pageset._file_logo = {src:'',aid:0};
                }else{
                    this.RightformBasic.pageset._file_background = {src:'',aid:0};
                }
            },
            handleUploaLogodSuccess(data){
                let self = this;
                if(data.files && data.files.length && data.files[0].data){
                    this.RightformBasic.pageset._file_logo = {src:data.files[0].data.img,aid:data.files[0].data.aid};
                }else if(data.files && data.files.length && data.files[0].error){
                    self.$message.error(data.files[0].error);
                }else{
                    self.$message.error('{lang upload_failed}');
                }
            },
            handleCoverUploaLogodSuccess(data){
                let self = this;
                if(data.files && data.files.length && data.files[0].data){
                    this.RightformBasic.pageset._file_cover = {src:data.files[0].data.img,aid:data.files[0].data.aid};
                }else if(data.files && data.files.length && data.files[0].error){
                    self.$message.error(data.files[0].error);
                }else{
                    self.$message.error('{lang upload_failed}');
                }
            },
            async addPosition(type){
                let self = this;
                let visit = {};
				let share = {};
				let download = {};
                if(parseFloat(self.SettingFormvisit.status)){
					visit = 0;
				}else if(self.SettingFormvisit.groups && self.SettingFormvisit.groups.length && self.SettingFormvisit.groups.indexOf('unlimit')>-1){
					visit = 1;
				}else{
					if(self.SettingFormvisit.groups && self.SettingFormvisit.groups.length){
						visit['groups'] = self.SettingFormvisit.groups;
					}
					if(self.SettingFormvisit.uids && self.SettingFormvisit.uids.length){
						visit['uids'] = self.SettingFormvisit.uids;
					}
				}
                if(parseFloat(self.SettingFormshare.status)){
					share = 0;
				}else if(self.SettingFormshare.groups && self.SettingFormshare.groups.length && self.SettingFormshare.groups.indexOf('unlimit')>-1){
					share = 1;
				}else{
					if(self.SettingFormshare.groups && self.SettingFormshare.groups.length){
						share['groups'] = self.SettingFormshare.groups;
					}
					if(self.SettingFormshare.uids && self.SettingFormshare.uids.length){
						share['uids'] = self.SettingFormshare.uids;
					}
				}
			
				if(parseFloat(self.SettingFormdown.status)){
					download = 0;
				}else if(self.SettingFormdown.groups && self.SettingFormdown.groups.length && self.SettingFormdown.groups.indexOf('unlimit')>-1){
					download = 1;
				}else{
					if(self.SettingFormdown.groups && self.SettingFormdown.groups.length){
						download['groups'] = self.SettingFormdown.groups;
					}
					if(self.SettingFormdown.uids && self.SettingFormdown.uids.length){
						download['uids'] = self.SettingFormdown.uids;
					}
				}
                let pageset = JSON.parse(JSON.stringify(this.RightformBasic.pageset));
                if(this.RightformBasic.pageset._file_logo.aid > 0){
                    pageset['_file_logo'] = {aid:this.RightformBasic.pageset._file_logo.aid,src:''};
                }else{
                    pageset['_file_logo'] = {aid:0,src:this.RightformBasic.pageset._file_logo.src};
                }
                if(this.RightformBasic.pageset._file_cover.aid > 0){
                    pageset['_file_cover'] = {aid:this.RightformBasic.pageset._file_cover.aid,src:''};
                }else{
                    pageset['_file_cover'] = {aid:0,src:this.RightformBasic.pageset._file_cover.src};
                }
                this.IsIframe = false;
                let param = {
					formhash:'{FORMHASH}',
					submit:true,
                    id:this.documentid,
					ptype:'{$data['ptype']}',
					pval:'{$data['pval']}',
                    pname:this.RightformBasic.pname,
                    metadescription:this.RightformBasic.metadescription,
                    metakeywords:this.RightformBasic.metakeywords,
                    address:this.RightformBasic.address,
					rpids:this.RightformBasic.collection,
                    view:visit,
                    download:download,
                    share:share,
                    pageset:pageset
                };
				if(type!=='save'){
					param['pstatus'] = 1;
				}
				let {data: res} = await axios.post('{MOD_URL}&op=admin&operation=basic',param);
				this.IsIframe = true;
            },
            SettingUserChange(data,type){
				var str = {
					groups:[],
					uids:[],
					data:[],
					checked:[],
					expanded:[],
					status:0
				}
				if(data && data.length){
					for(var i in data){
						var item = data[i];
						if(item.type == 'unlimit'){
							str.groups.push('unlimit');
							break;
						}
						if(item.type == 'user'){
							str.uids.push(item.id);
						}else{
							str.groups.push(item.id);
						}
						str.data.push(item);
					}
				}else{
					str.status = 1;
				}
                if(type == 'view'){
                    this.SettingFormvisit = str;
                }else if(type == 'down'){
                    this.SettingFormdown = str;
                }else if(type == 'share'){
                    this.SettingFormshare = str;
                }
			},
		}
	};
</script>
